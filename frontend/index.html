<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Groq AI Chatbot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-title">
        <span class="header-dot"></span>
        <h1>Groq Chat</h1>
      </div>
      <button id="clearBtn" class="clear-btn" title="Clear conversation">Clear</button>
    </header>

    <!-- Messages area -->
    <main id="chatWindow" class="chat-window">
      <div class="empty-state" id="emptyState">
        <p>👋 Say hello to get started.</p>
      </div>
    </main>

    <!-- Error banner (hidden by default) -->
    <div id="errorBanner" class="error-banner hidden">
      <span id="errorText"></span>
      <button id="dismissError" class="dismiss-btn">&times;</button>
    </div>

    <!-- Input area -->
    <footer class="input-area">
      <form id="chatForm" class="chat-form">
        <textarea
          id="messageInput"
          class="message-input"
          placeholder="Type a message..."
          rows="1"
          autocomplete="off"
        ></textarea>
        <button type="submit" id="sendBtn" class="send-btn" aria-label="Send message">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none">
            <path d="M3 12L21 3L14 21L11 13L3 12Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
          </svg>
        </button>
      </form>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
